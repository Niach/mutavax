# Contributor overlay for cloned-repo hot-reload dev.
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Rebuilds the combined image from ./backend/Dockerfile (includes the Next.js
# build), bind-mounts the backend source tree, swaps the entrypoint for
# uvicorn --reload on loopback 8000, and exposes 127.0.0.1:8000 so you can
# hit the FastAPI docs directly.
#
# For live frontend hot-reload, run `npm run dev` on the host in a second
# terminal (with NEXT_PUBLIC_API_URL=http://localhost:8000 in .env). The
# containerized Next.js server is disabled in this overlay.

services:
  cancerstudio:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: cancerstudio:dev
    entrypoint:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
