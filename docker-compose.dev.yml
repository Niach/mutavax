# Contributor overlay for cloned-repo hot-reload dev.
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Rebuilds the backend image from ./backend/Dockerfile, bind-mounts the source
# tree into the container, enables uvicorn --reload, and exposes the backend
# on 127.0.0.1:8000 so you can hit the FastAPI docs directly.
#
# The `web` service is intentionally NOT overridden here — run `npm run dev`
# on the host for a proper Next.js dev experience (fast refresh, devtools).
# Pair with NEXT_PUBLIC_API_URL=http://localhost:8000 in your .env.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: cancerstudio-backend:dev
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests

  web:
    profiles:
      - disabled
