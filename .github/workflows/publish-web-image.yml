name: Publish web image

# Publishes the Next.js frontend image (standalone Node server) to GHCR.
# Triggered on pushes to main and on semver tags. Mirrors publish-backend-image.yml.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "frontend/Dockerfile"
      - "next.config.ts"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - "postcss.config.mjs"
      - "tsconfig.json"
      - ".github/workflows/publish-web-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cancerstudio-web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
